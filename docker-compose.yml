services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-library_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Non_empty_DB_PASSWORD_required_in_dotenv}
      POSTGRES_DB: ${DB_DATABASE:-library}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        UID: ${DOCKER_UID:-1000}
        GID: ${DOCKER_GID:-1000}
    volumes:
      - .:/var/www/html
    ports:
      - '${APP_PORT:-8000}:8000'
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_URL: http://localhost:${APP_PORT:-8000}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: '5432'
      DB_DATABASE: ${DB_DATABASE:-library}
      DB_USERNAME: ${DB_USERNAME:-library_user}
      DB_PASSWORD: ${DB_PASSWORD:?Non_empty_DB_PASSWORD_required_in_dotenv}
    command: >
      sh -c "php artisan config:clear --no-ansi 2>/dev/null || true && exec php artisan serve --no-reload --host=0.0.0.0 --port=8000"
    healthcheck:
      test:
        [
          'CMD',
          'php',
          '-r',
          "exit(@file_get_contents('http://127.0.0.1:8000/api/v1/status/liveness') ? 0 : 1);",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  pgdata:
